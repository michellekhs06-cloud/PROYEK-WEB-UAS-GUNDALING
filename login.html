<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Admin</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-container">

    <h2>Login Admin</h2>

    <p>Silakan login untuk mengakses fitur Edit dan Delete.</p>

    <form id="formLogin">

        <label>Username</label>

        <input
            type="text"
            id="username"
            placeholder="Masukkan Username">

        <label>Password</label>

        <input
            type="password"
            id="password"
            placeholder="Masukkan Password">

        <p id="pesanError"></p>

        <button type="submit">

            Login

        </button>

    </form>

    <br>

    <a href="master_barang.html">

        Kembali

    </a>

</div>

<script src="login.js"></script>

</body>

</html>
